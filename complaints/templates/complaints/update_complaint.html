{% extends "base.html" %}
{% block title %}Update Complaint | Barangay Cawitan{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Update Complaint</h1>
    <p>{{ complaint.title }}</p>
</div>
<div class="content-card form-card">
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <div class="text-danger small mt-1">{{ error }}</div>
                {% endfor %}
            </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-success" type="submit">
                <i class="bi bi-check-circle-fill me-1"></i>Save Update
            </button>
            <a class="btn btn-outline-secondary" href="{% url 'complaints:detail' complaint.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
