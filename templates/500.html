{% extends "base.html" %}
{% block title %}Server Error | Barangay Cawitan{% endblock %}
{% block content %}
<div class="delete-confirm-wrap error-state-wrap">
    <div class="delete-confirm-card error-state-card">
        <div class="delete-icon-wrap">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <p class="section-kicker mb-2">500 Error</p>
        <h1 class="h5 fw-bold mb-2">Something went wrong</h1>
        <p class="entity-muted mb-4">
            The system could not complete the request. Please try again, or contact the barangay office if the issue continues.
        </p>
        <a class="btn btn-primary" href="{% url 'dashboard:home' %}">
            <i class="bi bi-house-fill me-1"></i>Go to Home
        </a>
    </div>
</div>
{% endblock %}
