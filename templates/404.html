{% extends "base.html" %}
{% block title %}Page Not Found | Barangay Cawitan{% endblock %}
{% block content %}
<div class="delete-confirm-wrap error-state-wrap">
    <div class="delete-confirm-card error-state-card">
        <div class="delete-icon-wrap error-icon-wrap">
            <i class="bi bi-map-fill"></i>
        </div>
        <p class="section-kicker mb-2">404 Error</p>
        <h1 class="h5 fw-bold mb-2">Page not found</h1>
        <p class="entity-muted mb-4">
            The page may have been moved, deleted, or the link may be incorrect.
        </p>
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a class="btn btn-primary" href="{% url 'dashboard:home' %}">
                <i class="bi bi-house-fill me-1"></i>Go to Home
            </a>
            {% if user.is_authenticated %}
                <a class="btn btn-outline-primary" href="{% url 'complaints:list' %}">
                    <i class="bi bi-clipboard-check-fill me-1"></i>View Complaints
                </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
